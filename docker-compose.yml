version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: chicken_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/chicken_db
      SESSION_SECRET: super-long-secret-key-change-in-production
      NODE_ENV: production
    depends_on:
      - db

volumes:
  postgres_data:
