openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Poultry farm management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: flocks
    description: Chicken flock management
  - name: hatching
    description: Hatching cycle management
  - name: tasks
    description: Daily task management
  - name: goals
    description: Goal tracking
  - name: logs
    description: Activity logs
  - name: dashboard
    description: Dashboard summaries
  - name: production
    description: Egg production tracking
  - name: sales
    description: Sales and revenue
  - name: health-records
    description: Flock health records
  - name: expenses
    description: Expense tracking
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /flocks:
    get:
      operationId: listFlocks
      tags: [flocks]
      summary: List all flocks
      responses:
        "200":
          description: List of flocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Flock"
    post:
      operationId: createFlock
      tags: [flocks]
      summary: Create a flock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFlockBody"
      responses:
        "201":
          description: Created flock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flock"

  /flocks/{id}:
    get:
      operationId: getFlock
      tags: [flocks]
      summary: Get a flock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Flock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flock"
    put:
      operationId: updateFlock
      tags: [flocks]
      summary: Update a flock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFlockBody"
      responses:
        "200":
          description: Updated flock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flock"
    delete:
      operationId: deleteFlock
      tags: [flocks]
      summary: Delete a flock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /hatching-cycles:
    get:
      operationId: listHatchingCycles
      tags: [hatching]
      summary: List hatching cycles
      responses:
        "200":
          description: List of hatching cycles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HatchingCycle"
    post:
      operationId: createHatchingCycle
      tags: [hatching]
      summary: Create a hatching cycle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHatchingCycleBody"
      responses:
        "201":
          description: Created cycle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HatchingCycle"

  /hatching-cycles/{id}:
    get:
      operationId: getHatchingCycle
      tags: [hatching]
      summary: Get a hatching cycle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hatching cycle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HatchingCycle"
    put:
      operationId: updateHatchingCycle
      tags: [hatching]
      summary: Update a hatching cycle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHatchingCycleBody"
      responses:
        "200":
          description: Updated cycle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HatchingCycle"
    delete:
      operationId: deleteHatchingCycle
      tags: [hatching]
      summary: Delete a hatching cycle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: date
          in: query
          schema:
            type: string
            description: Filter by date (YYYY-MM-DD)
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List goals
      responses:
        "200":
          description: List of goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"
    post:
      operationId: createGoal
      tags: [goals]
      summary: Create a goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGoalBody"
      responses:
        "201":
          description: Created goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

  /goals/{id}:
    put:
      operationId: updateGoal
      tags: [goals]
      summary: Update a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGoalBody"
      responses:
        "200":
          description: Updated goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
    delete:
      operationId: deleteGoal
      tags: [goals]
      summary: Delete a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /activity-logs:
    get:
      operationId: listActivityLogs
      tags: [logs]
      summary: List activity logs
      responses:
        "200":
          description: List of activity logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLog"
    post:
      operationId: createActivityLog
      tags: [logs]
      summary: Create an activity log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityLogBody"
      responses:
        "201":
          description: Created log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLog"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/hatch-stats:
    get:
      operationId: getHatchStats
      tags: [dashboard]
      summary: Get hatching statistics
      responses:
        "200":
          description: Hatch stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HatchStats"

  /tasks/today:
    get:
      operationId: getTodayTasks
      tags: [tasks]
      summary: Get today's tasks
      responses:
        "200":
          description: Today's tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Flock:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        breed:
          type: string
        count:
          type: integer
        ageDays:
          type: integer
        purpose:
          type: string
          enum: [eggs, meat, hatching, mixed]
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - breed
        - count
        - ageDays
        - purpose
        - createdAt

    CreateFlockBody:
      type: object
      properties:
        name:
          type: string
        breed:
          type: string
        count:
          type: integer
        ageDays:
          type: integer
        purpose:
          type: string
          enum: [eggs, meat, hatching, mixed]
        notes:
          type: string
          nullable: true
      required:
        - name
        - breed
        - count
        - ageDays
        - purpose

    HatchingCycle:
      type: object
      properties:
        id:
          type: integer
        batchName:
          type: string
        eggsSet:
          type: integer
        eggsHatched:
          type: integer
          nullable: true
        startDate:
          type: string
        setTime:
          type: string
          nullable: true
          description: "Time eggs were set (HH:MM)"
        expectedHatchDate:
          type: string
        actualHatchDate:
          type: string
          nullable: true
        lockdownDate:
          type: string
          nullable: true
          description: "Date eggs moved to lockdown (day 18)"
        lockdownTime:
          type: string
          nullable: true
          description: "Time eggs moved to lockdown (HH:MM)"
        status:
          type: string
          enum: [incubating, hatching, completed, failed]
        temperature:
          type: number
          nullable: true
          description: "Incubation temperature days 1-18 (°C)"
        humidity:
          type: number
          nullable: true
          description: "Incubation humidity days 1-18 (%)"
        lockdownTemperature:
          type: number
          nullable: true
          description: "Lockdown temperature days 18-21 (°C)"
        lockdownHumidity:
          type: number
          nullable: true
          description: "Lockdown humidity days 18-21 (%)"
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - batchName
        - eggsSet
        - startDate
        - expectedHatchDate
        - status
        - createdAt

    CreateHatchingCycleBody:
      type: object
      properties:
        batchName:
          type: string
        eggsSet:
          type: integer
        eggsHatched:
          type: integer
          nullable: true
        startDate:
          type: string
        setTime:
          type: string
          nullable: true
          description: "Time eggs were set (HH:MM)"
        expectedHatchDate:
          type: string
        actualHatchDate:
          type: string
          nullable: true
        lockdownDate:
          type: string
          nullable: true
          description: "Date eggs moved to lockdown (day 18)"
        lockdownTime:
          type: string
          nullable: true
          description: "Time eggs moved to lockdown (HH:MM)"
        status:
          type: string
          enum: [incubating, hatching, completed, failed]
        temperature:
          type: number
          nullable: true
          description: "Incubation temperature days 1-18 (°C)"
        humidity:
          type: number
          nullable: true
          description: "Incubation humidity days 1-18 (%)"
        lockdownTemperature:
          type: number
          nullable: true
          description: "Lockdown temperature days 18-21 (°C)"
        lockdownHumidity:
          type: number
          nullable: true
          description: "Lockdown humidity days 18-21 (%)"
        notes:
          type: string
          nullable: true
      required:
        - batchName
        - eggsSet
        - startDate
        - expectedHatchDate
        - status

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          enum: [feeding, health, cleaning, hatching, other]
        priority:
          type: string
          enum: [low, medium, high]
        completed:
          type: boolean
        dueDate:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - title
        - category
        - priority
        - completed
        - createdAt

    CreateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          enum: [feeding, health, cleaning, hatching, other]
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: string
          nullable: true
      required:
        - title
        - category
        - priority

    UpdateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          enum: [feeding, health, cleaning, hatching, other]
        priority:
          type: string
          enum: [low, medium, high]
        completed:
          type: boolean
        dueDate:
          type: string
          nullable: true

    Goal:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        targetValue:
          type: number
        currentValue:
          type: number
        unit:
          type: string
        category:
          type: string
          enum: [production, health, growth, financial, other]
        deadline:
          type: string
          nullable: true
        completed:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - targetValue
        - currentValue
        - unit
        - category
        - completed
        - createdAt

    CreateGoalBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        targetValue:
          type: number
        currentValue:
          type: number
        unit:
          type: string
        category:
          type: string
          enum: [production, health, growth, financial, other]
        deadline:
          type: string
          nullable: true
      required:
        - title
        - targetValue
        - currentValue
        - unit
        - category

    UpdateGoalBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        targetValue:
          type: number
        currentValue:
          type: number
        unit:
          type: string
        category:
          type: string
          enum: [production, health, growth, financial, other]
        deadline:
          type: string
          nullable: true
        completed:
          type: boolean

    ActivityLog:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          enum: [feeding, health, hatching, cleaning, observation, other]
        date:
          type: string
        createdAt:
          type: string
      required:
        - id
        - title
        - category
        - date
        - createdAt

    CreateActivityLogBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          enum: [feeding, health, hatching, cleaning, observation, other]
        date:
          type: string
      required:
        - title
        - category
        - date

    DashboardSummary:
      type: object
      properties:
        totalFlocks:
          type: integer
        totalChickens:
          type: integer
        activeHatchingCycles:
          type: integer
        totalEggsIncubating:
          type: integer
        tasksDueToday:
          type: integer
        tasksCompletedToday:
          type: integer
        goalsCompleted:
          type: integer
        totalGoals:
          type: integer
        overallHatchRate:
          type: number
      required:
        - totalFlocks
        - totalChickens
        - activeHatchingCycles
        - totalEggsIncubating
        - tasksDueToday
        - tasksCompletedToday
        - goalsCompleted
        - totalGoals
        - overallHatchRate

    HatchStats:
      type: object
      properties:
        totalCycles:
          type: integer
        completedCycles:
          type: integer
        totalEggsSet:
          type: integer
        totalEggsHatched:
          type: integer
        averageHatchRate:
          type: number
        bestHatchRate:
          type: number
        recentCycles:
          type: array
          items:
            $ref: "#/components/schemas/HatchingCycle"
      required:
        - totalCycles
        - completedCycles
        - totalEggsSet
        - totalEggsHatched
        - averageHatchRate
        - bestHatchRate
        - recentCycles
