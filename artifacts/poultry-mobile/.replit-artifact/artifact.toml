kind = "mobile"
previewPath = "/mobile/"
title = "مدير المزرعة - موبايل"
version = "1.0.0"
id = "artifacts/poultry-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 23652

[services.development]
run = "pnpm --filter @workspace/poultry-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poultry-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/poultry-mobile", "run", "serve" ]

[services.env]
PORT = "23652"
BASE_PATH = "/mobile/"
